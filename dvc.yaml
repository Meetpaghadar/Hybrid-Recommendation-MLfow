stages:
  data_cleaning:
    cmd: python data_cleaning.py
    deps:
      - data/Music Info.csv
      - data_cleaning.py
    outs: 
      - data/cleaned_data.csv

  transform_data:
    cmd: python content_based.py
    deps:
      - data/cleaned_data.csv
      - content_based.py
      - data_cleaning.py
    outs:
      - data/transformed_data.npz
      - transformer.joblib